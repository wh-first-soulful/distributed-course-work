# docker-compose.yml
version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: lightmall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: jhx714050
      MYSQL_DATABASE: lightmall
      MYSQL_USER: lightmall
      MYSQL_PASSWORD: lightmall
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    networks:
      - lightmall-network
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --init-connect='SET NAMES utf8mb4' --skip-character-set-client-handshake
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pjhx714050"]
      interval: 10s
      timeout: 5s
      retries: 20

  # Nginx反向代理
  nginx:
    image: nginx:1.21
    container_name: lightmall-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - lightmall-network
    depends_on:
      - gateway
    restart: always

  # 网关服务
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: lightmall-gateway
    ports:
      - "9080:9080"
    networks:
      - lightmall-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # 商品服务
  goods:
    build:
      context: .
      dockerfile: Dockerfile.goods
    container_name: lightmall-goods
    ports:
      - "9082:9082"
    networks:
      - lightmall-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # 订单服务
  order:
    build:
      context: .
      dockerfile: Dockerfile.order
    container_name: lightmall-order
    ports:
      - "9083:9083"
    networks:
      - lightmall-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # 库存服务
  stock:
    build:
      context: .
      dockerfile: Dockerfile.stock
    container_name: lightmall-stock
    ports:
      - "9085:9084"
    networks:
      - lightmall-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # 用户服务
  user:
    build:
      context: .
      dockerfile: Dockerfile.user
    container_name: lightmall-user
    ports:
      - "9081:9081"
    networks:
      - lightmall-network
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  # Redis缓存
  redis:
    image: redis:7.0
    container_name: lightmall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lightmall-network
    restart: always

# 网络配置
networks:
  lightmall-network:
    driver: bridge

# 数据卷配置
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local