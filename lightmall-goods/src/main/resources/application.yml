spring:
  datasource:
    url: jdbc:mysql://mysql:3306/lightmall?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: lightmall
    password: lightmall
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  redis:
    host: redis
    port: 6379
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.lightmall.goods.model

server:
  port: 9082